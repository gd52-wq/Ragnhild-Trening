<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ragnhild Supersterk v2</title>
    <style>
        :root { --primary: #c0392b; --secondary: #2c3e50; --card: rgba(255, 255, 255, 0.92); }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 10px; min-height: 100vh;
            background: url('bedlington.jpg') no-repeat center center fixed; 
            background-size: cover;
        }
        .header { text-align: center; padding: 15px 0; background: rgba(44, 62, 80, 0.85); color: white; border-radius: 8px; margin-bottom: 20px; }
        .container { max-width: 500px; margin: auto; }
        
        /* Dag-velger knapper */
        .day-selector { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .btn-day { 
            width: 60px; height: 60px; border-radius: 50%; border: none; 
            background: white; color: var(--secondary); font-weight: bold; 
            font-size: 1.2em; box-shadow: 0 4px 6px rgba(0,0,0,0.2); cursor: pointer; transition: 0.2s;
        }
        .btn-day.active { background: var(--primary); color: white; transform: scale(1.1); }

        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); border-left: 5px solid var(--primary); }
        .ex-title { font-weight: bold; color: var(--secondary); font-size: 1.1em; display: block; margin-bottom: 5px; }
        .ex-info { font-size: 0.9em; color: #444; margin-bottom: 5px; font-weight: 600; }
        .ex-desc { font-size: 0.85em; color: #666; margin-bottom: 10px; line-height: 1.3; font-style: italic; }
        .input-row { display: flex; gap: 10px; margin-top: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .btn-save { padding: 10px 15px; background: var(--primary); color: white; border: none; border-radius: 5px; font-weight: bold; }
        
        .footer-btns { display: flex; align-items: center; gap: 10px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-small { background: #95a5a6; font-size: 0.75em; padding: 5px 10px; border: none; color: white; border-radius: 4px; }
        
        /* Stil for dato-visning */
        .last-date { font-size: 0.75em; color: #7f8c8d; font-weight: bold; }
        
        .history-area { margin-top: 10px; padding: 10px; background: #fdfdfd; border-radius: 5px; display: none; border: 1px solid #ddd; }
        .history-item { font-size: 0.8em; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 4px 0; }
        
        .video-link { color: var(--primary); font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0">Ragnhild Supersterk</h2>
        <p style="margin:5px 0 0 0">Pust ut og tren tungt! ❤️🐾</p>
    </div>

    <div class="day-selector">
        <button id="btn-1" class="btn-day" onclick="updateView('1')">1</button>
        <button id="btn-2" class="btn-day" onclick="updateView('2')">2</button>
        <button id="btn-3" class="btn-day" onclick="updateView('3')">3</button>
    </div>

    <div id="workoutContent"></div>
</div>

<script>
const program = {
    "1": [
        { id: "m1", t: "Pust & Kontroll", i: "3x10", d: "Aktiver dyp kjerne med utpust. Ligg på rygg, bøyde knær, Video: https://www.youtube.com/watch?v=d7fbiUEs_0U&t=224s" },
        { id: "m2", t: "Sittende Roing", i: "3x10-12", d: "Godt grep, brystet frem." },
        { id: "m3", t: "Gående utfall", i: "3x10 per bein", d: "Hold manualer i hendene (lavt tyngdepunkt)." },
        { id: "m4", t: "Benkpress m/stopp", i: "3x8", d: "Husk å puste ut på vei opp!" },
        { id: "m5", t: "Liggende lårcurl", i: "3x10-12", d: "Bakside lår uten ryggbelastning." },
        { id: "m6", t: "Sittende skulderpress", i: "3x8-10", d: "Ryggstøtte reduserer buktrykket." }
    ],
    "2": [
        { id: "o1", t: "Dead bugs", i: "3x10", d: "Kjernestyrke uten press. Motsatt arm/bein ned. Video: https://www.youtube.com/watch?v=g_BYB0R-4Ws" },
        { id: "o2", t: "Nedtrekk (bredt)", i: "3x10", d: "Fokus på kontakt med lats." },
        { id: "o3", t: "Leg Extension", i: "3x12", d: "Isolert trening av fremside lår." },
        { id: "o4", t: "Skråbenk m/manualer", i: "3x10", d: "Grei vinkel for skuldre og bryst." },
        { id: "o5", t: "Facepulls", i: "3x15", d: "Holdning og bakside skuldre." }
    ],
    "3": [
        { id: "f1", t: "Planke på knær/tær", i: "3x30 sek", d: "Hold spennet, ikke hold pusten!" },
        { id: "f2", t: "Hip Thrust (Maskin)", i: "3x12", d: "Fokus på kontakt med setet. Skvis på topp." },
        { id: "f3", t: "Bulgarsk utfall", i: "3x8 per bein", d: "Ett og ett bein er tryggere enn bøy. Video: https://www.youtube.com/watch?v=aobvXAySqhc" },
        { id: "f4", t: "Smal benkpress", i: "3x10", d: "Triceps og bryst." },
        { id: "f5", t: "Sittende lårcurl", i: "3x12", d: "Bakside lår." },
        { id: "f6", t: "Sidehev m/manualer", i: "3x12-15", d: "Skuldre." }
    ]
};

function updateView(day) {
    localStorage.setItem('nsf_last_day', day);
    
    document.querySelectorAll('.btn-day').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + day).classList.add('active');

    const container = document.getElementById('workoutContent');
    container.innerHTML = program[day].map(ex => {
        // Hent siste dato fra lokal historikk
        const hist = JSON.parse(localStorage.getItem('nsf_v4_' + ex.id)) || [];
        const lastDate = hist.length > 0 ? hist[0].date : "Ingen logg";

        const formattedDesc = ex.d.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="video-link">Se video</a>');

        return `
        <div class="card">
            <span class="ex-title">${ex.t}</span>
            <div class="ex-info">${ex.i}</div>
            <div class="ex-desc">${formattedDesc}</div>
            <div class="input-row">
                <input type="number" id="in-${ex.id}" placeholder="Vekt" inputmode="decimal">
                <button class="btn-save" onclick="save('${ex.id}', '${day}')">Lagre</button>
            </div>
            <div class="footer-btns">
                <button class="btn-small" onclick="toggleHistory('${ex.id}')">Logg</button>
                <span class="last-date">Sist: ${lastDate}</span>
            </div>
            <div class="history-area" id="hist-area-${ex.id}">
                <div id="hist-list-${ex.id}"></div>
            </div>
        </div>
    `}).join('');
}

function save(id, day) {
    const val = document.getElementById('in-' + id).value;
    if(!val) return;
    const date = new Date().toLocaleDateString('no-NO', {day:'2-digit', month:'2-digit'});
    let history = JSON.parse(localStorage.getItem('nsf_v4_' + id)) || [];
    history.unshift({ weight: val, date: date });
    localStorage.setItem('nsf_v4_' + id, JSON.stringify(history.slice(0,5)));
    document.getElementById('in-' + id).value = '';
    
    // Oppdatert visning for å få med den nye datoen med en gang
    updateView(day); 
}

function toggleHistory(id) {
    const area = document.getElementById('hist-area-' + id);
    if(area.style.display === 'block') { area.style.display = 'none'; } 
    else { 
        area.style.display = 'block';
        const list = document.getElementById('hist-list-' + id);
        const hist = JSON.parse(localStorage.getItem('nsf_v4_' + id)) || [];
        list.innerHTML = hist.map(h => `<div class="history-item"><span>${h.date}</span><strong>${h.weight} kg</strong></div>`).join('') || 'Ingen logg';
    }
}

const savedDay = localStorage.getItem('nsf_last_day') || '1';
updateView(savedDay);
</script>
</body>
</html>
