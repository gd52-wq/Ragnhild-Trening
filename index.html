<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ragnhild Supersterk v2</title>
    <style>
        :root { --primary: #e67e22; --secondary: #2c3e50; --card: rgba(255, 255, 255, 0.95); }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 10px; min-height: 100vh;
            background: url('bedlington.jpg') no-repeat center center fixed; 
            background-size: cover;
        }
        .header { text-align: center; padding: 15px 0; background: rgba(44, 62, 80, 0.85); color: white; border-radius: 12px; margin-bottom: 20px; }
        .container { max-width: 500px; margin: auto; }
        
        .day-selector { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .btn-day { 
            width: 75px; height: 75px; border: none; background: none; cursor: pointer; transition: all 0.2s ease; padding: 0;
            position: relative; color: #7f8c8d; font-weight: 900; font-size: 1.5em;
        }
        .btn-day svg { width: 100%; height: 100%; fill: #ffffff; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15)); transition: 0.3s; }
        .btn-day span { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); z-index: 10; }
        .btn-day.active svg { fill: var(--primary); transform: scale(1.1) rotate(-5deg); }
        .btn-day.active { color: white; }

        .card { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); border-left: 6px solid var(--primary); }
        .ex-title { font-weight: bold; color: var(--secondary); font-size: 1.15em; display: block; margin-bottom: 5px; }
        .ex-info { font-size: 0.95em; color: #2c3e50; margin-bottom: 5px; font-weight: 700; }
        .ex-desc { font-size: 0.85em; color: #555; margin-bottom: 12px; line-height: 1.4; font-style: italic; }
        
        .input-row { display: flex; gap: 10px; margin-top: 10px; }
        input { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        
        /* Gjør placeholder-teksten litt tydeligere */
        input::placeholder { color: #95a5a6; font-style: italic; font-size: 0.9em; }

        .btn-save { padding: 10px 18px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .footer-btns { display: flex; align-items: center; gap: 10px; margin-top: 12px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-small { background: #bdc3c7; font-size: 0.8em; padding: 6px 12px; border: none; color: white; border-radius: 6px; cursor: pointer; }
        .last-date { font-size: 0.8em; color: #95a5a6; font-weight: bold; }
        
        .history-area { margin-top: 10px; padding: 10px; background: #f9f9f9; border-radius: 8px; display: none; border: 1px solid #eee; }
        .history-item { font-size: 0.85em; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 6px 0; }
        .video-link { color: var(--primary); font-weight: bold; text-decoration: none; border-bottom: 1px dashed var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0">Ragnhild Supersterk</h2>
        <p style="margin:5px 0 0 0">Pust ut og tren smart! ❤️🐾</p>
    </div>

    <div class="day-selector">
        <button id="btn-1" class="btn-day" onclick="updateView('1')">
            <svg viewBox="0 0 512 512"><circle cx="256" cy="350" r="110" /><circle cx="120" cy="220" r="45" /><circle cx="210" cy="150" r="50" /><circle cx="305" cy="150" r="50" /><circle cx="395" cy="220" r="45" /></svg>
            <span>1</span>
        </button>
        <button id="btn-2" class="btn-day" onclick="updateView('2')">
            <svg viewBox="0 0 512 512"><circle cx="256" cy="350" r="110" /><circle cx="120" cy="220" r="45" /><circle cx="210" cy="150" r="50" /><circle cx="305" cy="150" r="50" /><circle cx="395" cy="220" r="45" /></svg>
            <span>2</span>
        </button>
        <button id="btn-3" class="btn-day" onclick="updateView('3')">
            <svg viewBox="0 0 512 512"><circle cx="256" cy="350" r="110" /><circle cx="120" cy="220" r="45" /><circle cx="210" cy="150" r="50" /><circle cx="305" cy="150" r="50" /><circle cx="395" cy="220" r="45" /></svg>
            <span>3</span>
        </button>
    </div>

    <div id="workoutContent"></div>
</div>

<script>
const program = {
    "1": [
        { id: "m1", t: "Pust & Kontroll", i: "3x10", d: "Aktiver dyp kjerne med utpust. Video: https://www.youtube.com/watch?v=d7fbiUEs_0U&t=224s" },
        { id: "m2", t: "Sittende Roing", i: "3x10-12", d: "Godt grep, brystet frem." },
        { id: "m3", t: "Gående utfall", i: "3x10 per bein", d: "Hold manualer i hendene." },
        { id: "m4", t: "Benkpress m/stopp", i: "3x8", d: "Pust ut på vei opp!" },
        { id: "m5", t: "Liggende lårcurl", i: "3x10-12", d: "Bakside lår uten ryggbelastning." },
        { id: "m6", t: "Sittende skulderpress", i: "3x8-10", d: "Ryggstøtte er viktig her." }
    ],
    "2": [
        { id: "o1", t: "Dead bugs", i: "3x10", d: "Kjernestyrke uten press. Video: https://www.youtube.com/watch?v=g_BYB0R-4Ws" },
        { id: "o2", t: "Nedtrekk (bredt)", i: "3x10", d: "Trekk mot øvre bryst." },
        { id: "o3", t: "Leg Extension", i: "3x12", d: "Fremside lår i maskin." },
        { id: "o4", t: "Skråbenk m/manualer", i: "3x10", d: "Pust ut på vei opp." },
        { id: "o5", t: "Facepulls", i: "3x15", d: "Bakside skuldre." }
    ],
    "3": [
        { id: "f1", t: "Planke på knær/tær", i: "3x30 sek", d: "Jevn pust hele veien." },
        { id: "f2", t: "Hip Thrust (Maskin)", i: "3x12", d: "Skvis rumpa! Video: https://www.youtube.com/watch?v=SEdqd1n01Iw" },
        { id: "f3", t: "Bulgarsk utfall", i: "3x8 per bein", d: "Bakre fot på benk. Video: https://www.youtube.com/watch?v=aobvXAySqhc" },
        { id: "f4", t: "Smal benkpress", i: "3x10", d: "Tette albuer." },
        { id: "f5", t: "Sittende lårcurl", i: "3x12", d: "Bakside lår." },
        { id: "f6", t: "Sidehev m/manualer", i: "3x12-15", d: "Kontrollerte bevegelser." }
    ]
};

function updateView(day) {
    localStorage.setItem('nsf_last_day', day);
    
    document.querySelectorAll('.btn-day').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + day).classList.add('active');

    const container = document.getElementById('workoutContent');
    container.innerHTML = program[day].map(ex => {
        const hist = JSON.parse(localStorage.getItem('nsf_v4_' + ex.id)) || [];
        
        // Finn siste vekt og dato
        const lastWeight = hist.length > 0 ? hist[0].weight : "";
        const lastDate = hist.length > 0 ? hist[0].date : "Ingen logg";
        
        // Lag placeholder-tekst
        const placeholderText = lastWeight ? `Sist: ${lastWeight} kg` : "Vekt";

        const formattedDesc = ex.d.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="video-link">Se video</a>');

        return `
        <div class="card">
            <span class="ex-title">${ex.t}</span>
            <div class="ex-info">${ex.i}</div>
            <div class="ex-desc">${formattedDesc}</div>
            <div class="input-row">
                <input type="number" id="in-${ex.id}" placeholder="${placeholderText}" inputmode="decimal">
                <button class="btn-save" onclick="save('${ex.id}', '${day}')">Lagre</button>
            </div>
            <div class="footer-btns">
                <button class="btn-small" onclick="toggleHistory('${ex.id}')">Logg</button>
                <span class="last-date">Dato: ${lastDate}</span>
            </div>
            <div class="history-area" id="hist-area-${ex.id}">
                <div id="hist-list-${ex.id}"></div>
            </div>
        </div>
    `}).join('');
}

function save(id, day) {
    const val = document.getElementById('in-' + id).value;
    if(!val) return;
    const date = new Date().toLocaleDateString('no-NO', {day:'2-digit', month:'2-digit'});
    let history = JSON.parse(localStorage.getItem('nsf_v4_' + id)) || [];
    history.unshift({ weight: val, date: date });
    localStorage.setItem('nsf_v4_' + id, JSON.stringify(history.slice(0,5)));
    document.getElementById('in-' + id).value = '';
    updateView(day); 
}

function toggleHistory(id) {
    const area = document.getElementById('hist-area-' + id);
    area.style.display = (area.style.display === 'block') ? 'none' : 'block';
    if(area.style.display === 'block') {
        const list = document.getElementById('hist-list-' + id);
        const hist = JSON.parse(localStorage.getItem('nsf_v4_' + id)) || [];
        list.innerHTML = hist.map(h => `<div class="history-item"><span>${h.date}</span><strong>${h.weight} kg</strong></div>`).join('') || 'Ingen logg';
    }
}

const savedDay = localStorage.getItem('nsf_last_day') || '1';
updateView(savedDay);
</script>
</body>
</html>
