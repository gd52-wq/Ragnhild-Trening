<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ragnhild Supersterk Pro</title>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        :root { --primary: #e67e22; --secondary: #2c3e50; --card: rgba(255, 255, 255, 0.95); --success: #27ae60; --gold: #f1c40f; --video: #2980b9; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 10px; min-height: 100vh;
            background: url('bedlington.jpg') no-repeat center center fixed; 
            background-size: cover;
        }
        .header { text-align: center; padding: 15px 0; background: rgba(44, 62, 80, 0.85); color: white; border-radius: 12px; margin-bottom: 15px; }
        .container { max-width: 500px; margin: auto; }
        
        .day-selector { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .btn-day { 
            width: 70px; height: 70px; border: none; background: none; cursor: pointer; transition: all 0.2s ease; padding: 0;
            position: relative; color: #7f8c8d; font-weight: 900; font-size: 1.4em;
        }
        .btn-day svg { width: 100%; height: 100%; fill: #ffffff; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15)); transition: 0.3s; }
        .btn-day span { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); z-index: 10; }
        .btn-day.active svg { fill: var(--primary); transform: scale(1.1); }
        .btn-day.active { color: white; }

        .mood-box { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .mood-options { display: flex; justify-content: space-around; margin-top: 10px; }
        .mood-btn { font-size: 2em; cursor: pointer; border: 2px solid transparent; border-radius: 10px; padding: 5px; transition: 0.2s; background: none; }
        .mood-btn.active { border-color: var(--primary); background: rgba(230, 126, 34, 0.1); transform: scale(1.2); }

        .card { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); border-left: 6px solid var(--primary); position: relative; }
        .ex-title { font-weight: bold; color: var(--secondary); font-size: 1.15em; display: block; margin-bottom: 5px; }
        
        .pers-badge { position: absolute; top: 10px; right: 10px; color: var(--gold); font-weight: bold; font-size: 0.8em; display: none; align-items: center; gap: 4px; animation: bounce 0.5s ease; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

        .set-tracker { display: flex; gap: 10px; margin: 10px 0; align-items: center; }
        .set-dot { width: 25px; height: 25px; border: 2px solid #bdc3c7; border-radius: 50%; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 0.7em; color: #bdc3c7; font-weight: bold; }
        .set-dot.done { background: var(--success); border-color: var(--success); color: white; }

        .ex-desc { font-size: 0.9em; color: #666; margin-bottom: 10px; }
        .video-btn { display: inline-flex; align-items: center; gap: 5px; margin-top: 8px; padding: 6px 12px; background: var(--video); color: white; text-decoration: none; border-radius: 6px; font-size: 0.8em; font-weight: bold; }

        .input-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
        input { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; outline: none; }
        .btn-save { padding: 12px 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-timer { padding: 12px 10px; background: var(--secondary); color: white; border: none; border-radius: 8px; font-size: 0.8em; font-weight: bold; cursor: pointer; min-width: 85px; }
        
        .footer-btns { display: flex; align-items: center; gap: 10px; margin-top: 12px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-small { background: #bdc3c7; font-size: 0.8em; padding: 6px 12px; border: none; color: white; border-radius: 6px; cursor: pointer; }
        .last-date { font-size: 0.8em; color: #95a5a6; font-weight: bold; }
        
        .history-area { margin-top: 10px; padding: 10px; background: #f9f9f9; border-radius: 8px; display: none; border: 1px solid #eee; }
        .chart-div { width: 100%; height: 150px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2 style="margin:0">Ragnhild Supersterk Pro</h2></div>

    <div class="day-selector">
        <button id="btn-1" class="btn-day" onclick="updateView('1')"><svg viewBox="0 0 512 512"><circle cx="256" cy="350" r="110" /><circle cx="120" cy="220" r="45" /><circle cx="210" cy="150" r="50" /><circle cx="305" cy="150" r="50" /><circle cx="395" cy="220" r="45" /></svg><span>1</span></button>
        <button id="btn-2" class="btn-day" onclick="updateView('2')"><svg viewBox="0 0 512 512"><circle cx="256" cy="350" r="110" /><circle cx="120" cy="220" r="45" /><circle cx="210" cy="150" r="50" /><circle cx="305" cy="150" r="50" /><circle cx="395" cy="220" r="45" /></svg><span>2</span></button>
        <button id="btn-3" class="btn-day" onclick="updateView('3')"><svg viewBox="0 0 512 512"><circle cx="256" cy="350" r="110" /><circle cx="120" cy="220" r="45" /><circle cx="210" cy="150" r="50" /><circle cx="305" cy="150" r="50" /><circle cx="395" cy="220" r="45" /></svg><span>3</span></button>
    </div>

    <div class="mood-box">
        <div style="font-weight: bold; color: var(--secondary);">Hvordan er formen i dag?</div>
        <div class="mood-options">
            <button class="mood-btn" onclick="setMood('⚡')">⚡</button>
            <button class="mood-btn" onclick="setMood('💪')">💪</button>
            <button class="mood-btn" onclick="setMood('😴')">😴</button>
            <button class="mood-btn" onclick="setMood('🤕')">🤕</button>
        </div>
    </div>

    <div id="workoutContent"></div>
</div>

<script>
google.charts.load('current', {'packages':['corechart']});

let activeTimers = {};
let currentMood = "";

const program = {
    "1": [
        { id: "m1", t: "Pust & Kontroll", i: "3x10", d: "Pust ut på vei opp.", timer: false, v: "" },
        { id: "m2", t: "Sittende Roing", i: "3x10-12", d: "Godt grep.", timer: true, v: "" },
        { id: "m3", t: "Gående utfall", i: "3x10 per bein", d: "Hold manualer.", timer: true, v: "" },
        { id: "m4", t: "Benkpress m/stopp", i: "1x8, 2x6, 2x5, 2x4", d: "Husk stopp på hver rep.", timer: true, v: "" },
        { id: "m5", t: "Liggende lårcurl", i: "3x10-12", d: "Bakside lår.", timer: false, v: "https://www.youtube.com/watch?v=FovXvLshOIs" }
    ],
    "2": [
        { id: "o1", t: "Pallof Press (Kabel)", i: "3x10", d: "Stå sidelengs, press håndtaket rett frem. Motstå rotasjon. Pust ut på press..", timer: false, v: "https://www.youtube.com/shorts/qOnAC5hz0Vg" },
        { id: "o2", t: "Nedtrekk (bredt)", i: "3x10", d: "Trekk mot bryst.", timer: true, v: "" },
        { id: "o3", t: "Leg Extension/lårcurl", i: "3x12", d: "Fremside lår.", timer: false, v: "" },
        { id: "o4", t: "Skråbenk m/manualer eller stativ", i: "3x10", d: "Kontrollert.", timer: true, v: "" },
        { id: "o5", t: "Facepulls", i: "3x15", d: "Holdning.", timer: false, v: "" }
    ],
    "3": [
        { id: "f1", t: "Planke på knær/tær", i: "3x30 sek", d: "Hold spennet.", timer: false, v: "" },
        { id: "f2", t: "Hip Thrust (Maskin)", i: "3x12", d: "Skvis rumpa!", timer: true, v: "https://www.youtube.com/shorts/0xfdeCBwoYw" },
        { id: "f3", t: "Bulgarsk utfall", i: "3x8 per bein", d: "Tungt for beina.", timer: true, v: "https://www.youtube.com/watch?v=agbrf5fckgY" },
        { id: "f4", t: "Benkpress m/stopp", i: "2x6, 2x5, 2x3", d: "1 sek markert stopp på brystet.", timer: true, v: "" },
        { id: "f5", t: "Sittende lårcurl", i: "3x12", d: "Bakside lår.", timer: false, v: "" }
    ]
};

// NY FUNKSJON: Lagrer avsjekk i minnet
function toggleSet(exId, setNum, element) {
    element.classList.toggle('done');
    const isDone = element.classList.contains('done');
    localStorage.setItem(`set_${exId}_${setNum}`, isDone);
}

function setMood(emoji) {
    currentMood = emoji;
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.toggle('active', b.innerText === emoji));
}

function updateView(day) {
    localStorage.setItem('nsf_last_day', day);
    document.querySelectorAll('.btn-day').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + day).classList.add('active');

    const container = document.getElementById('workoutContent');
    container.innerHTML = program[day].map(ex => {
        const hist = JSON.parse(localStorage.getItem('nsf_v4_' + ex.id)) || [];
        const lastWeight = hist.length > 0 ? hist[0].weight : "";
        const lastDate = hist.length > 0 ? hist[0].date : "Ingen logg";

        // Sjekker om sett var huket av fra før
        const s1 = localStorage.getItem(`set_${ex.id}_1`) === 'true' ? 'done' : '';
        const s2 = localStorage.getItem(`set_${ex.id}_2`) === 'true' ? 'done' : '';
        const s3 = localStorage.getItem(`set_${ex.id}_3`) === 'true' ? 'done' : '';

        return `
        <div class="card" id="card-${ex.id}">
            <div id="pers-${ex.id}" class="pers-badge">🌟 NY PERS!</div>
            <span class="ex-title">${ex.t}</span>
            <div class="ex-info">${ex.i}</div>
            <div class="ex-desc">
                ${ex.d}
                ${ex.v ? `<br><a href="${ex.v}" target="_blank" class="video-btn">Se video 🎥</a>` : ''}
            </div>
            
            <div class="set-tracker">
                <span style="font-size: 0.8em; color: #666;">Sett:</span>
                <div class="set-dot ${s1}" onclick="toggleSet('${ex.id}', 1, this)">1</div>
                <div class="set-dot ${s2}" onclick="toggleSet('${ex.id}', 2, this)">2</div>
                <div class="set-dot ${s3}" onclick="toggleSet('${ex.id}', 3, this)">3</div>
            </div>

            <div class="input-row">
                <input type="number" id="in-${ex.id}" placeholder="Sist: ${lastWeight} kg" inputmode="decimal">
                <button class="btn-save" onclick="save('${ex.id}', '${day}')">Lagre</button>
                ${ex.timer ? `<button id="timer-${ex.id}" class="btn-timer" onclick="startTimer('${ex.id}')">Pause 2m</button>` : ''}
            </div>
            <div class="footer-btns">
                <button class="btn-small" onclick="toggleHistory('${ex.id}', '${ex.t}')">Logg & Graf</button>
                <span class="last-date">${lastDate}</span>
            </div>
            <div class="history-area" id="hist-area-${ex.id}">
                <div id="chart-${ex.id}" class="chart-div"></div>
                <div id="hist-list-${ex.id}"></div>
            </div>
        </div>
    `}).join('');
}

function save(id, day) {
    const val = document.getElementById('in-' + id).value;
    if(!val) return;
    const weightVal = parseFloat(val);
    const date = new Date().toLocaleDateString('no-NO', {day:'2-digit', month:'2-digit'});
    
    let history = JSON.parse(localStorage.getItem('nsf_v4_' + id)) || [];
    const oldMax = history.length > 0 ? Math.max(...history.map(h => h.weight)) : 0;
    
    if (weightVal > oldMax && history.length > 0) {
        document.getElementById('pers-' + id).style.display = 'flex';
    }

    history.unshift({ weight: weightVal, date: date, mood: currentMood });
    localStorage.setItem('nsf_v4_' + id, JSON.stringify(history.slice(0,10)));
    
    updateView(day);
}

function startTimer(id) {
    if (activeTimers[id]) return;
    const btn = document.getElementById('timer-' + id);
    let timeLeft = 120;
    btn.classList.add('running');
    activeTimers[id] = setInterval(() => {
        timeLeft--;
        btn.innerText = `${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
        if (timeLeft <= 0) {
            clearInterval(activeTimers[id]);
            delete activeTimers[id];
            btn.innerText = "KLAR!";
            btn.classList.replace('running', 'finished');
            if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }
    }, 1000);
}

function drawChart(id, title) {
    const hist = JSON.parse(localStorage.getItem('nsf_v4_' + id)) || [];
    if (hist.length < 2) return;
    const dataArray = [['Dato', 'Kg']];
    [...hist].reverse().forEach(h => dataArray.push([h.date, h.weight]));
    const data = google.visualization.arrayToDataTable(dataArray);
    const chart = new google.visualization.LineChart(document.getElementById('chart-' + id));
    chart.draw(data, { title: title, curveType: 'function', legend: 'none', colors: ['#e67e22'], backgroundColor: 'transparent' });
}

function toggleHistory(id, title) {
    const area = document.getElementById('hist-area-' + id);
    const isOpen = area.style.display === 'block';
    area.style.display = isOpen ? 'none' : 'block';
    if(!isOpen) {
        setTimeout(() => drawChart(id, title), 100);
        const hist = JSON.parse(localStorage.getItem('nsf_v4_' + id)) || [];
        document.getElementById('hist-list-' + id).innerHTML = hist.map(h => `<div class="history-item"><span>${h.date} ${h.mood || ''}</span><strong>${h.weight} kg</strong></div>`).join('');
    }
}

updateView(localStorage.getItem('nsf_last_day') || '1');
</script>
</body>
</html>
